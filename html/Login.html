<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login </title>
  <link rel="stylesheet" href="/agro/css/login.css">
</head>

<body class="login-page">

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h2>Login Form</h2>
        
        <h2>Welcome Back</h2>
        <p>Login to your account or join our community.</p>
      </div>

      <form action="../php/login.php" method="POST" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>

      <hr class="divider">

      <div class="registration-options">
        <p>Don't have an account? <a href="Account.html" class="create-account-link">Create Account</a></p>
      </div>
    </div>
  </div>

</body>

</html>
